spring.application.name=panda-cloud-springboot-dashboard
server.port=8083
server.servlet.context-path=/panda-cloud/springboot-dashbooard/

#系统Tomcat优化配置
server.tomcat.uri-encoding=UTF-8
server.tomcat.threads.min-spare=128
server.tomcat.threads.max=800
server.tomcat.accept-count=1000
server.tomcat.max-connections=10000
server.tomcat.max-http-form-post-size=-1
server.tomcat.max-keep-alive-requests=3600000
server.tomcat.max-swallow-size=36000


eureka.client.service-url.default-zone=http://localhost:8082/panda-cloud/eureka/
spring.security.user.name=admin
spring.security.user.password=PandaCloud@2021


management.endpoints.web.exposure.exclude=*
management.endpoint.health.show-details=always